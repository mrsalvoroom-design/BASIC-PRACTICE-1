<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BASIC GRAMMAR QUIZ</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

<style>
body{font-family:Arial;background:#f3e8ff;padding:30px;}
.container{max-width:800px;margin:auto;background:white;border-radius:20px;padding:20px;}
.option{padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:10px;cursor:pointer;}
.option:hover{background:#eee;}
.correct{background:#d1fae5;}
.wrong{background:#fee2e2;}
.explanation{background:#fff3cd;padding:10px;margin-top:10px;border-radius:10px;}
.toast{position:fixed;bottom:20px;right:20px;padding:12px;border-radius:10px;color:white;font-weight:bold;}
</style>
</head>

<body>

<div class="container">
<h2 id="question"></h2>
<div id="options"></div>
<div id="explanation"></div>

<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>

<p>Score: <span id="score">0</span></p>
</div>

<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c8f3a0d4e.mp3"></audio>

<script>

const questions = [
{q:"She ___ to school yesterday",o:["go","goes","went","going"],a:2,e:"Past tense → went"},
{q:"He ___ playing now",o:["is","are","was","be"],a:0,e:"Present continuous"},
{q:"They ___ finished homework",o:["has","have","is","are"],a:1,e:"Plural → have"},
{q:"I ___ a car",o:["has","have","is","are"],a:1,e:"I → have"},
{q:"She can ___ English",o:["speak","speaks","spoke","speaking"],a:0,e:"Modal + V1"}
];

let current=0;
let answers=new Array(questions.length).fill(null);

// unlock audio
document.body.addEventListener("click",function unlock(){
document.getElementById("correctSound").play().then(()=>{correctSound.pause()}).catch(()=>{});
document.getElementById("wrongSound").play().then(()=>{wrongSound.pause()}).catch(()=>{});
document.body.removeEventListener("click",unlock);
});

function toast(msg,color){
let t=document.createElement("div");
t.className="toast";
t.style.background=color;
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

function render(){
let q=questions[current];
document.getElementById("question").innerText=q.q;

let optDiv=document.getElementById("options");
optDiv.innerHTML="";

q.o.forEach((opt,i)=>{
let div=document.createElement("div");
div.className="option";

if(answers[current]!=null){
if(i==q.a) div.classList.add("correct");
if(i==answers[current] && i!=q.a) div.classList.add("wrong");
}

div.innerText=opt;

div.onclick=()=>{
if(answers[current]!=null) return;

answers[current]=i;

if(i==q.a){
confetti({particleCount:150,spread:80});
correctSound.currentTime=0;
correctSound.play();
toast("BENAR","green");
}else{
wrongSound.currentTime=0;
wrongSound.play();
toast("SALAH","red");
}

render();
update();
};

optDiv.appendChild(div);
});

let exp=document.getElementById("explanation");
if(answers[current]!=null){
exp.innerHTML="<b>Penjelasan:</b> "+q.e;
}else{
exp.innerHTML="";
}
}

function update(){
let score=answers.reduce((a,x,i)=>a+(x==questions[i].a?1:0),0);
document.getElementById("score").innerText=score;
}

function next(){if(current<questions.length-1){current++;render();}}
function prev(){if(current>0){current--;render();}}

render();

</script>

</body>
</html>
