<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Salvo Group | Grammar Basic Part 1</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f8f9ff 0%, #f0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .quiz-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2), 0 2px 10px rgba(0,0,0,0.02);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .hero {
            background: linear-gradient(135deg, #FFFFFF 0%, #F3E8FF 100%);
            padding: 1.8rem 2rem;
            border-bottom: 1px solid rgba(128, 90, 213, 0.2);
        }

        .hero h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(120deg, #5E3A9C, #9B6BFF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .hero h1 i {
            background: none;
            color: #8B5CF6;
            font-size: 2rem;
        }

        .sub {
            color: #4a3b6e;
            font-weight: 500;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .score-panel {
            background: white;
            margin: 0 1.8rem 1rem 1.8rem;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 6px 14px rgba(106, 46, 176, 0.08);
            border: 1px solid rgba(156, 107, 255, 0.3);
        }

        .score-box {
            background: #f1ebff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 700;
            color: #5a2d9c;
        }

        .score-box span {
            font-size: 1.3rem;
            font-weight: 800;
            color: #6c2bd9;
        }

        .progress-indicator {
            font-weight: 500;
            background: #ede8ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            color: #4f359b;
        }

        .quiz-card {
            padding: 1.8rem 2rem 2rem 2rem;
        }

        .question-text {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1E1A3E;
            margin-bottom: 2rem;
            line-height: 1.3;
            background: #F9F6FF;
            padding: 1rem 1.5rem;
            border-radius: 2rem;
            border-left: 8px solid #9B6BFF;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option-btn {
            background: white;
            border: 1.5px solid #E2D6FF;
            border-radius: 1.2rem;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #2d2a4a;
        }

        .option-btn:hover:not(:disabled) {
            background: #F5EFFF;
            border-color: #9B6BFF;
            transform: translateX(6px);
        }

        .prefix {
            font-weight: 800;
            background: #ede4ff;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #6c2bd9;
        }

        .feedback-area {
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin: 1rem 0 1.5rem;
            border-left: 6px solid #9B6BFF;
            transition: all 0.2s;
        }

        .feedback-correct {
            background: #E6F9ED;
            border-left-color: #2b9348;
        }

        .feedback-wrong {
            background: #FFEFEF;
            border-left-color: #e63946;
        }

        .feedback-neutral {
            background: #F4F0FE;
            border-left-color: #bdc3e0;
        }

        .feedback-text {
            font-weight: 500;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            gap: 1rem;
        }

        .nav-btn {
            background: white;
            border: none;
            padding: 0.8rem 1.6rem;
            border-radius: 2rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
        }

        .nav-btn-primary {
            background: linear-gradient(95deg, #7C3AED, #A78BFA);
            color: white;
            border: none;
            box-shadow: 0 6px 14px rgba(124, 58, 237, 0.3);
        }

        .nav-btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-area {
            background: white;
            border-radius: 2rem;
            margin: 1rem 1.8rem 1.8rem 1.8rem;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-top: 2px solid #cbbaff;
        }

        .weakness-tag {
            background: #ede8ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin: 0.2rem;
        }

        .chart-container {
            max-width: 220px;
            margin: 0 auto;
        }

        @media (max-width: 680px) {
            .quiz-card {
                padding: 1rem;
            }
            .question-text {
                font-size: 1.3rem;
            }
            .hero h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container" id="quizApp">
    <div class="hero">
        <h1><i class="fas fa-gem"></i> SALVO GROUP <br style="display: none;"> GRAMMAR BASIC PART 1</h1>
        <div class="sub">✨ Master your English grammar — instant feedback & smart scoring</div>
    </div>

    <div class="score-panel">
        <div class="score-box"><i class="fas fa-star-of-life"></i> SCORE : <span id="scoreValue">0</span> / <span id="totalQuestions">0</span></div>
        <div class="progress-indicator"><i class="fas fa-question-circle"></i> Soal <span id="currentIdxDisplay">1</span> dari <span id="totalDisplay">0</span></div>
    </div>

    <div class="quiz-card" id="quizCard">
        <div class="question-text" id="questionText">Loading...</div>
        <div class="options-grid" id="optionsContainer"></div>
        <div id="feedbackArea" class="feedback-area feedback-neutral">
            <div class="feedback-text"><i class="fas fa-lightbulb"></i> Pilih salah satu jawaban untuk melihat pembahasan & kunci.</div>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" disabled><i class="fas fa-arrow-left"></i> Sebelumnya</button>
            <button class="nav-btn nav-btn-primary" id="nextBtn" disabled><i class="fas fa-arrow-right"></i> Selanjutnya</button>
        </div>
    </div>

    <div id="resultArea" class="result-area" style="display: none;">
        <!-- hasil akhir dengan chart dan kelemahan -->
    </div>
</div>

<script>
    // ---------- SOAL + JAWABAN LENGKAP + PENJELASAN (DIKOREKSI) ----------
    const questionsData = [
        { 
            q: "Where ___ your mom usually pick you up?", 
            o: ["Have", "do", "has", "does"], 
            correct: 3, 
            explanation: "💡 **Pembahasan:** Subjek 'your mom' adalah orang ketiga tunggal (she). Dalam Simple Present Tense untuk kalimat tanya, kita menggunakan auxiliary 'does' diikuti verb-1. Rumus: Where + does + subject + verb-1? ✓ Jawaban: <strong>does</strong>" 
        },
        { 
            q: "___ you just said to Febri?", 
            o: ["What did", "What", "What have", "What does"], 
            correct: 2, 
            explanation: "💡 **Pembahasan:** Kalimat ini menggunakan Present Perfect Tense karena ada kata 'just' yang menunjukkan kejadian baru saja terjadi. Rumus: What + have/has + subject + verb-3? Subjek 'you' menggunakan 'have'. ✓ Jawaban: <strong>What have</strong> (What have you just said to Febri?)" 
        },
        { 
            q: "___ cleaned up this floor last night?", 
            o: ["Who did", "Who does", "who", "Who Was"], 
            correct: 2, 
            explanation: "💡 **Pembahasan:** Ketika menanyakan subjek (pelaku) dengan 'who', kita tidak memerlukan auxiliary 'do/does/did'. Cukup gunakan 'who' diikuti verb-2 (past tense) karena ada keterangan waktu 'last night'. ✓ Jawaban: <strong>Who</strong> (Who cleaned up this floor last night?)" 
        },
        { 
            q: "___ your father been a civil servant?", 
            o: ["Does", "Has", "Is", "Did"], 
            correct: 1, 
            explanation: "💡 **Pembahasan:** Kalimat ini menggunakan Present Perfect Tense yang ditandai dengan kata 'been' (verb-3 dari 'be'). Subjek 'your father' adalah orang ketiga tunggal, sehingga menggunakan auxiliary 'has'. ✓ Jawaban: <strong>Has</strong> (Has your father been a civil servant?)" 
        },
        { 
            q: "With whom does Jerry ___ to work?", 
            o: ["goes", "go", "gone", "going"], 
            correct: 1, 
            explanation: "💡 **Pembahasan:** Setelah auxiliary 'does' dalam kalimat tanya, kata kerja yang digunakan harus berbentuk verb-1 (infinitive tanpa 'to'). ✓ Jawaban: <strong>go</strong> (With whom does Jerry go to work?)" 
        },
        { 
            q: "___ you so serious last night?", 
            o: ["Why did", "Why was", "Why were", "Why do"], 
            correct: 2, 
            explanation: "💡 **Pembahasan:** Kalimat ini menggunakan Simple Past Tense dengan kata 'last night'. Subjek 'you' dalam past tense menggunakan 'were'. ✓ Jawaban: <strong>Why were</strong> (Why were you so serious last night?)" 
        },
        { 
            q: "She lost her keys and she couldn't find ___ anywhere", 
            o: ["their", "there", "they're", "them"], 
            correct: 3, 
            explanation: "💡 **Pembahasan:** 'keys' adalah benda jamak (plural). Object pronoun untuk benda jamak adalah 'them'. ✓ Jawaban: <strong>them</strong> (She couldn't find them anywhere)" 
        },
        { 
            q: "Whose car ___ your friend driving?", 
            o: ["do", "does", "are", "is"], 
            correct: 3, 
            explanation: "💡 **Pembahasan:** Kalimat ini menggunakan Present Continuous Tense (driving). Subjek 'your friend' adalah tunggal, sehingga menggunakan 'is'. Rumus: Whose + is + subject + verb-ing? ✓ Jawaban: <strong>is</strong> (Whose car is your friend driving?)" 
        },
        { 
            q: "___ you always think about him?", 
            o: ["what", "what are", "what do", "what did"], 
            correct: 2, 
            explanation: "💡 **Pembahasan:** Kata 'always' menandakan kebiasaan (Simple Present Tense). Subjek 'you' menggunakan auxiliary 'do' untuk kalimat tanya. ✓ Jawaban: <strong>what do</strong> (What do you always think about him?)" 
        },
        { 
            q: "___ just someone ordered here?", 
            o: ["what have", "what had", "what has", "what are"], 
            correct: 2, 
            explanation: "💡 **Pembahasan:** Kata 'just' menandakan Present Perfect Tense. Subjek 'someone' adalah orang ketiga tunggal, menggunakan 'has'. ✓ Jawaban: <strong>what has</strong> (What has just someone ordered here?)" 
        },
        { 
            q: "She ___ well in the final exam", 
            o: ["perform", "performed", "performs", "performing"], 
            correct: 2, 
            explanation: "💡 **Pembahasan:** Karena tidak ada keterangan waktu lampau dan ini merupakan fakta umum atau kebiasaan, kita menggunakan Simple Present Tense. Subjek 'She' (orang ketiga tunggal) menggunakan verb+s. ✓ Jawaban: <strong>performs</strong> (She performs well in the final exam)" 
        },
        { 
            q: "She ___ a beautiful painting yesterday", 
            o: ["paint", "paints", "painted", "painting"], 
            correct: 2, 
            explanation: "💡 **Pembahasan:** Kata 'yesterday' adalah keterangan waktu lampau, sehingga menggunakan Simple Past Tense. ✓ Jawaban: <strong>painted</strong> (She painted a beautiful painting yesterday)" 
        },
        { 
            q: "We ___ attend a meeting tomorrow", 
            o: ["will", "will be", "want", "can"], 
            correct: 0, 
            explanation: "💡 **Pembahasan:** Kata 'tomorrow' menandakan Future Tense. Rumus Simple Future: Subject + will + verb-1. ✓ Jawaban: <strong>will</strong> (We will attend a meeting tomorrow)" 
        },
        { 
            q: "Does your sister ___ music?", 
            o: ["listen", "listens", "listened", "listening"], 
            correct: 0, 
            explanation: "💡 **Pembahasan:** Setelah auxiliary 'does' dalam kalimat tanya, kata kerja harus berbentuk verb-1 (infinitive). ✓ Jawaban: <strong>listen</strong> (Does your sister listen to music?)" 
        },
        { 
            q: "___ he ___ correctly?", 
            o: ["does-answered", "Has-answered", "Does-answering", "have-answered"], 
            correct: 1, 
            explanation: "💡 **Pembahasan:** Untuk menanyakan apakah seseorang telah melakukan sesuatu dengan benar, kita menggunakan Present Perfect Tense. Subjek 'he' menggunakan 'has' diikuti verb-3 'answered'. ✓ Jawaban: <strong>Has-answered</strong> (Has he answered correctly?)" 
        },
        { 
            q: "My mom ___ in the kitchen now", 
            o: ["cook", "cooks", "is cooking", "was cooking"], 
            correct: 2, 
            explanation: "💡 **Pembahasan:** Kata 'now' menunjukkan aksi yang sedang berlangsung saat ini, menggunakan Present Continuous Tense. Subjek 'My mom' (tunggal) menggunakan 'is' + verb-ing. ✓ Jawaban: <strong>is cooking</strong> (My mom is cooking in the kitchen now)" 
        },
        { 
            q: "___ you ___ that movie last week?", 
            o: ["Do-saw", "do-seen", "do-see", "did-see"], 
            correct: 3, 
            explanation: "💡 **Pembahasan:** Kata 'last week' adalah keterangan waktu lampau, sehingga menggunakan Simple Past Tense. Kalimat tanya menggunakan 'did' diikuti verb-1 'see'. ✓ Jawaban: <strong>did-see</strong> (Did you see that movie last week?)" 
        },
        { 
            q: "My father ___ to the market every morning", 
            o: ["go", "goes", "went", "going"], 
            correct: 1, 
            explanation: "💡 **Pembahasan:** Kata 'every morning' menunjukkan kebiasaan (Simple Present Tense). Subjek 'My father' (orang ketiga tunggal) menggunakan verb+s. ✓ Jawaban: <strong>goes</strong> (My father goes to the market every morning)" 
        },
        { 
            q: "___ you usually ___ up at 4 AM?", 
            o: ["Do-wake", "Does-wake", "Did-wake", "Do-wakes"], 
            correct: 0, 
            explanation: "💡 **Pembahasan:** Kata 'usually' menandakan kebiasaan (Simple Present Tense). Subjek 'you' menggunakan auxiliary 'do' diikuti verb-1 'wake'. ✓ Jawaban: <strong>Do-wake</strong> (Do you usually wake up at 4 AM?)" 
        }
    ];

    // state aplikasi
    let currentIndex = 0;
    let userAnswers = new Array(questionsData.length).fill(null);
    let answerStatus = new Array(questionsData.length).fill(false);
    let answeredQuestions = new Array(questionsData.length).fill(false);
    let score = 0;
    
    const totalQ = questionsData.length;
    document.getElementById("totalQuestions").innerText = totalQ;
    document.getElementById("totalDisplay").innerText = totalQ;
    
    // Elemen DOM
    const questionTextEl = document.getElementById("questionText");
    const optionsContainer = document.getElementById("optionsContainer");
    const feedbackArea = document.getElementById("feedbackArea");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const scoreSpan = document.getElementById("scoreValue");
    const currentIdxDisplaySpan = document.getElementById("currentIdxDisplay");
    const resultAreaDiv = document.getElementById("resultArea");
    const quizCardDiv = document.getElementById("quizCard");
    
    // fungsi hitung ulang score berdasarkan answerStatus
    function recalcScore() {
        let newScore = 0;
        for (let i = 0; i < totalQ; i++) {
            if (answerStatus[i] === true) newScore++;
        }
        score = newScore;
        scoreSpan.innerText = score;
    }
    
    // update tampilan tombol navigasi
    function updateNavButtons() {
        prevBtn.disabled = (currentIndex === 0);
        
        if (currentIndex === totalQ - 1) {
            nextBtn.innerHTML = '<i class="fas fa-check-circle"></i> Lihat Hasil';
        } else {
            nextBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Selanjutnya';
        }
        
        if (!answeredQuestions[currentIndex]) {
            nextBtn.disabled = true;
        } else {
            nextBtn.disabled = false;
        }
    }
    
    // render feedback berdasarkan jawaban yang tersimpan
    function renderFeedbackForCurrent() {
        const idx = currentIndex;
        const selected = userAnswers[idx];
        const isAnswered = answeredQuestions[idx];
        const isCorrect = answerStatus[idx];
        const question = questionsData[idx];
        
        if (!isAnswered || selected === null) {
            feedbackArea.className = "feedback-area feedback-neutral";
            feedbackArea.innerHTML = `<div class="feedback-text"><i class="fas fa-lightbulb"></i> Pilih salah satu jawaban untuk melihat pembahasan & kunci.</div>`;
            return;
        }
        
        const selectedText = question.o[selected];
        const correctText = question.o[question.correct];
        const explanation = question.explanation;
        
        if (isCorrect) {
            feedbackArea.className = "feedback-area feedback-correct";
            feedbackArea.innerHTML = `
                <div class="feedback-text">
                    <i class="fas fa-check-circle" style="color:#2b9348; font-size:1.2rem;"></i>
                    <strong>✅ Jawaban Benar!</strong> &nbsp; Pilihanmu: "${selectedText}" 
                </div>
                <div style="margin-top: 8px; font-size:0.95rem; line-height:1.5;">${explanation}</div>
            `;
        } else {
            feedbackArea.className = "feedback-area feedback-wrong";
            feedbackArea.innerHTML = `
                <div class="feedback-text">
                    <i class="fas fa-times-circle" style="color:#e63946; font-size:1.2rem;"></i>
                    <strong>❌ Jawaban Salah</strong> &nbsp; Kamu menjawab: "${selectedText}"
                </div>
                <div style="margin-top: 8px; font-size:0.95rem; line-height:1.5;">${explanation}<br><br>📌 <strong>Jawaban yang benar adalah:</strong> "${correctText}"</div>
            `;
        }
    }
    
    // render soal saat ini
    function renderCurrentQuestion() {
        const qData = questionsData[currentIndex];
        questionTextEl.innerText = qData.q;
        const selectedIdx = userAnswers[currentIndex];
        const isAnsweredLocal = answeredQuestions[currentIndex];
        
        let optionsHtml = '';
        const letters = ['A', 'B', 'C', 'D'];
        qData.o.forEach((opt, idx) => {
            let additionalClass = '';
            let checkedStyle = '';
            if (isAnsweredLocal && selectedIdx === idx) {
                additionalClass = 'style="background: #E9DFFF; border-color: #9B6BFF; box-shadow: 0 2px 8px rgba(155,107,255,0.2);"';
                checkedStyle = 'font-weight: bold;';
            }
            optionsHtml += `
                <div class="option-btn" data-opt-index="${idx}" ${additionalClass}>
                    <span class="prefix">${letters[idx]}</span>
                    <span style="flex:1; ${checkedStyle}">${opt}</span>
                </div>
            `;
        });
        optionsContainer.innerHTML = optionsHtml;
        
        // attach event listener ke opsi
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const optIndex = parseInt(btn.dataset.optIndex);
                handleAnswer(optIndex);
            });
        });
        
        renderFeedbackForCurrent();
        updateNavButtons();
        document.getElementById("currentIdxDisplay").innerText = currentIndex + 1;
    }
    
    // handle jawaban dipilih
    function handleAnswer(selectedIndex) {
        const currentQ = questionsData[currentIndex];
        const isCorrectNow = (selectedIndex === currentQ.correct);
        const wasAlreadyAnswered = answeredQuestions[currentIndex];
        
        userAnswers[currentIndex] = selectedIndex;
        answeredQuestions[currentIndex] = true;
        const oldStatus = answerStatus[currentIndex];
        answerStatus[currentIndex] = isCorrectNow;
        
        if (oldStatus !== isCorrectNow) {
            recalcScore();
        } else if (!wasAlreadyAnswered && isCorrectNow) {
            recalcScore();
        } else if (!wasAlreadyAnswered && !isCorrectNow) {
            recalcScore();
        } else if (wasAlreadyAnswered && oldStatus !== isCorrectNow) {
            recalcScore();
        } else {
            recalcScore();
        }
        
        renderCurrentQuestion();
        updateNavButtons();
    }
    
    // navigasi next
    function goNext() {
        if (currentIndex < totalQ - 1) {
            currentIndex++;
            renderCurrentQuestion();
            updateNavButtons();
        } else {
            if (answeredQuestions.every(v => v === true)) {
                showFinalResult();
            } else {
                alert(`⚠️ Anda belum menjawab semua soal! Selesaikan dulu ${totalQ - answeredQuestions.filter(v=>v===true).length} soal tersisa.`);
                return;
            }
        }
    }
    
    function goPrev() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
            updateNavButtons();
        }
    }
    
    // fungsi analisis kelemahan
    function analyzeWeakness() {
        let categories = {
            "Auxiliary & Helping Verbs": [],
            "Tenses (Simple Present)": [],
            "Tenses (Past/Present Perfect)": [],
            "Tenses (Future/Continuous)": [],
            "Pronouns & Objects": [],
            "Question Words & Structure": []
        };
        
        for (let i = 0; i < totalQ; i++) {
            const isCorrect = answerStatus[i];
            const qText = questionsData[i].q;
            let category = "";
            
            if (qText.includes("does") || qText.includes("do") || qText.includes("did") || qText.includes("has") || qText.includes("have")) {
                if (qText.includes("Where ___") || qText.includes("With whom does")) category = "Auxiliary & Helping Verbs";
                else if (qText.includes("___ he ___") || qText.includes("___ your father been")) category = "Auxiliary & Helping Verbs";
                else category = "Auxiliary & Helping Verbs";
            }
            else if (qText.includes("every morning") || qText.includes("usually") || (qText.includes("She ___ well") && !qText.includes("yesterday"))) category = "Tenses (Simple Present)";
            else if (qText.includes("yesterday") || qText.includes("last night") || qText.includes("last week")) category = "Tenses (Past/Present Perfect)";
            else if (qText.includes("now") || qText.includes("tomorrow") || qText.includes("driving")) category = "Tenses (Future/Continuous)";
            else if (qText.includes("her keys") || qText.includes("find ___")) category = "Pronouns & Objects";
            else category = "Question Words & Structure";
            
            if (!isCorrect) {
                categories[category] = categories[category] || [];
                categories[category].push(i+1);
            }
        }
        
        let weaknesses = [];
        for (let [cat, arr] of Object.entries(categories)) {
            if (arr.length > 0) weaknesses.push({ cat, count: arr.length, soal: arr });
        }
        return weaknesses;
    }
    
    function showFinalResult() {
        quizCardDiv.style.display = "none";
        document.querySelector(".score-panel").style.display = "none";
        resultAreaDiv.style.display = "block";
        
        const percentage = (score / totalQ) * 100;
        let gradeText = "";
        if (percentage >= 85) gradeText = "🏆 Excellent! Grammar pro!";
        else if (percentage >= 70) gradeText = "🎉 Good job, tingkatkan lagi!";
        else if (percentage >= 50) gradeText = "📚 Perlu belajar lebih giat, fokus pada pembahasan.";
        else gradeText = "⚠️ Masih banyak kelemahan, pelajari ulang materi dasar.";
        
        const weaknesses = analyzeWeakness();
        let weakHtml = `<div style="margin-top: 16px;"><strong><i class="fas fa-chart-line"></i> Analisis Kelemahan:</strong><br/>`;
        if (weaknesses.length === 0) {
            weakHtml += `<span class="weakness-tag"><i class="fas fa-check-circle"></i> Hebat! Tidak ada kelemahan signifikan!</span>`;
        } else {
            weakHtml += `<div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;">`;
            weaknesses.forEach(w => {
                weakHtml += `<span class="weakness-tag"><i class="fas fa-exclamation-triangle"></i> ${w.cat} (salah di ${w.soal.length} soal: nomor ${w.soal.join(", ")})</span>`;
            });
            weakHtml += `</div><p style="margin-top: 12px; font-size: 0.85rem;">✨ Fokus ulang pada materi di atas untuk meningkatkan skor!</p>`;
        }
        
        resultAreaDiv.innerHTML = `
            <div style="text-align: center;">
                <i class="fas fa-chalkboard-user" style="font-size: 3rem; color:#8B5CF6;"></i>
                <h2 style="margin: 10px 0 5px;">Hasil Evaluasi Grammar</h2>
                <div style="font-size: 2.5rem; font-weight: 800; background: linear-gradient(145deg,#7C3AED,#A78BFA); -webkit-background-clip:text; background-clip:text; color:transparent;">${score}/${totalQ}</div>
                <div style="background:#ede8ff; display:inline-block; padding:5px 18px; border-radius:40px;">${gradeText}</div>
                <div style="margin: 20px auto; max-width: 200px;">
                    <canvas id="scoreChart" width="200" height="200"></canvas>
                </div>
                ${weakHtml}
                <button id="restartQuizBtn" class="nav-btn nav-btn-primary" style="margin-top: 25px; background: #5a2d9c;"><i class="fas fa-sync-alt"></i> Ulangi Kuis</button>
            </div>
        `;
        
        const ctx = document.getElementById('scoreChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Benar', 'Salah'],
                datasets: [{
                    data: [score, totalQ - score],
                    backgroundColor: ['#9B6BFF', '#F0E6FF'],
                    borderWidth: 0,
                    cutout: '65%'
                }]
            },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
        });
        
        document.getElementById("restartQuizBtn").addEventListener("click", () => {
            userAnswers.fill(null);
            answerStatus.fill(false);
            answeredQuestions.fill(false);
            currentIndex = 0;
            score = 0;
            recalcScore();
            quizCardDiv.style.display = "block";
            document.querySelector(".score-panel").style.display = "flex";
            resultAreaDiv.style.display = "none";
            renderCurrentQuestion();
            updateNavButtons();
        });
    }
    
    // event listeners navigasi
    prevBtn.addEventListener("click", goPrev);
    nextBtn.addEventListener("click", goNext);
    
    // init
    recalcScore();
    renderCurrentQuestion();
</script>
</body>
</html>
