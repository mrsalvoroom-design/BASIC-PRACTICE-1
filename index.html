<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SALVO QUIZ FIXED UI</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#f5f0ff,#e9dcff);
padding:20px;
}

.quiz{
max-width:900px;
margin:auto;
background:white;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
overflow:hidden;
}

.header{
background:linear-gradient(135deg,#6c2bd9,#a855f7);
color:white;
text-align:center;
padding:20px;
}

.content{
padding:25px;
}

.option{
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#f3edff;
}

.correct{background:#d1fae5;}
.wrong{background:#fee2e2;}

.explanation{
background:#fff8dc;
padding:10px;
margin-top:10px;
border-left:5px solid orange;
border-radius:10px;
}

.nav{
display:flex;
justify-content:space-between;
padding:15px;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
padding:12px 20px;
border-radius:10px;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<div class="quiz">
<div class="header">
<h2>🔥 SALVO QUIZ PRO</h2>
</div>

<div class="content">
<h3 id="question"></h3>
<div id="options"></div>
<div id="explanation"></div>
</div>

<div class="nav">
<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>
</div>
</div>

<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c8f3a0d4e.mp3"></audio>

<script>

const questions=[
{q:"She ___ to school yesterday",o:["go","goes","went","going"],a:2,e:"Past tense → went"},
{q:"He ___ playing now",o:["is","are","was","be"],a:0,e:"Present continuous"},
{q:"They ___ finished homework",o:["has","have","is","are"],a:1,e:"Plural → have"}
];

let current=0;
let answers=new Array(questions.length).fill(null);

// unlock sound
document.body.addEventListener("click",function(){
correctSound.play().then(()=>correctSound.pause()).catch(()=>{});
wrongSound.play().then(()=>wrongSound.pause()).catch(()=>{});
},{once:true});

function toast(msg,color){
let t=document.createElement("div");
t.className="toast";
t.style.background=color;
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

function render(){
let q=questions[current];
document.getElementById("question").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach((opt,i)=>{
let div=document.createElement("div");
div.className="option";

if(answers[current]!=null){
if(i==q.a) div.classList.add("correct");
if(i==answers[current] && i!=q.a) div.classList.add("wrong");
}

div.innerText=opt;

div.onclick=()=>{
if(answers[current]!=null) return;

answers[current]=i;

if(i==q.a){
confetti({particleCount:150,spread:80});
correctSound.currentTime=0;
correctSound.play();
toast("✅ BENAR","green");
}else{
wrongSound.currentTime=0;
wrongSound.play();
toast("❌ SALAH","red");
}

render();
};

box.appendChild(div);
});

let exp=document.getElementById("explanation");
if(answers[current]!=null){
exp.innerHTML="<b>Penjelasan:</b> "+q.e;
}else{
exp.innerHTML="";
}
}

function next(){if(current<questions.length-1){current++;render();}}
function prev(){if(current>0){current--;render();}}

render();

</script>

</body>
</html>
