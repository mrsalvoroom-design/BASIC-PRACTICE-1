<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Grammar Quiz - SALVO GROUP</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .header {
            background: linear-gradient(135deg, #6c2bd9, #9b4dff);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            padding: 15px 25px;
            background: #f8f0ff;
            border-bottom: 1px solid #e0d0ff;
        }

        .stats div {
            font-weight: bold;
            color: #6c2bd9;
        }

        .quiz-content {
            padding: 30px;
        }

        .question {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #2d2a3e;
        }

        .options {
            margin-bottom: 20px;
        }

        .option {
            padding: 14px 18px;
            margin: 10px 0;
            background: #faf9ff;
            border: 1px solid #e0d5ff;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            background: #f0eaff;
            border-color: #9b4dff;
            transform: translateX(5px);
        }

        .option.disabled {
            cursor: default;
            opacity: 0.8;
        }

        .option.disabled:hover {
            transform: none;
            background: #faf9ff;
        }

        .option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #6c2bd9;
        }

        .option.disabled input {
            cursor: default;
        }

        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 16px;
            color: #2d2a3e;
        }

        .option.disabled label {
            cursor: default;
        }

        .option.correct-bg {
            background: #d1fae5;
            border-color: #10b981;
        }

        .option.wrong-bg {
            background: #fee2e2;
            border-color: #ef4444;
        }

        .explanation {
            background: #fef9e6;
            border-left: 5px solid #f59e0b;
            padding: 16px 20px;
            border-radius: 12px;
            margin: 20px 0;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .explanation.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .explanation i {
            color: #f59e0b;
            margin-right: 8px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-prev, .btn-next {
            background: white;
            border: 2px solid #d9c6ff;
            color: #6c2bd9;
        }

        .btn-prev:hover, .btn-next:hover {
            background: #f5edff;
        }

        .btn-prev:disabled, .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            background: linear-gradient(95deg, #10b981, #34d399);
            color: white;
            width: 100%;
            margin-top: 20px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px #10b981;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        .badge.correct {
            background: #10b981;
            color: white;
        }

        .badge.wrong {
            background: #ef4444;
            color: white;
        }

        .badge.unanswered {
            background: #e9e2ff;
            color: #6c2bd9;
        }

        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .result-modal.show {
            visibility: visible;
            opacity: 1;
        }

        .result-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
        }

        .result-card i {
            font-size: 60px;
            color: #fbbf24;
        }

        .result-card h2 {
            margin: 20px 0;
        }

        .final-score {
            font-size: 48px;
            font-weight: bold;
            color: #6c2bd9;
            margin: 20px 0;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #faf9ff;
            color: #6b4e9e;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📖 BASIC GRAMMAR QUIZ</h1>
        <p>🎓 SALVO GROUP | The best English online course</p>
    </div>

    <div class="stats">
        <div>⭐ Score: <span id="score">0</span> / <span id="total">20</span></div>
        <div>✅ Answered: <span id="answered">0</span></div>
        <button id="resetBtn" style="background: none; border: none; color: #6c2bd9; cursor: pointer; font-weight: bold;">🔄 Reset</button>
    </div>

    <div class="quiz-content">
        <div class="question" id="questionText"></div>
        <div class="options" id="optionsContainer"></div>
        <div class="explanation" id="explanationBox"></div>

        <div class="nav-buttons">
            <button class="btn-prev" id="prevBtn">◀ Previous</button>
            <span style="padding: 12px; background: #f0e9ff; border-radius: 40px; font-weight: bold;" id="pageIndicator">1 / 20</span>
            <button class="btn-next" id="nextBtn">Next ▶</button>
        </div>
        <button class="btn-submit" id="submitBtn">📊 Submit Quiz & Lihat Hasil</button>
    </div>
    <footer>✨ Klik jawaban → Confetti jika benar! Penjelasan langsung muncul ✨</footer>
</div>

<div class="result-modal" id="resultModal">
    <div class="result-card">
        <i>🏆</i>
        <h2>Quiz Complete!</h2>
        <div class="final-score" id="finalScore">0/20</div>
        <p id="gradeMessage"></p>
        <button id="closeResultBtn" style="background: #6c2bd9; color: white; padding: 12px 24px; border: none; border-radius: 40px; margin-top: 20px; cursor: pointer;">Try Again</button>
    </div>
</div>

<script>
    // ========================
    // DATA SOAL - GANTI DI SINI SESUAI KEBUTUHAN ANDA
    // ========================
    const questions = [
        { text: "Wendy ______ to market 2 days ago", options: ["go", "goes", "went", "going"], correct: 2, explanation: "✅ <strong>Went</strong> adalah bentuk past tense dari 'go'. '2 days ago' = waktu lampau → pakai Verb 2." },
        { text: "She didn't _______ her holiday anywhere", options: ["spend", "spends", "spent", "spending"], correct: 0, explanation: "✅ <strong>Spend</strong> (Verb 1). Setelah 'didn't', kata kerja harus bentuk dasar." },
        { text: "Miss Jannah _______ here yesterday", options: ["is", "was", "were", "are"], correct: 1, explanation: "✅ <strong>Was</strong> (past tense of 'is'). Subject tunggal + yesterday." },
        { text: "Our English Teacher __________ Sick Yesterday", options: ["is", "am", "were", "was"], correct: 3, explanation: "✅ <strong>Was</strong> untuk subject tunggal di masa lampau." },
        { text: "She didn't _________ me to her party yesterday", options: ["invite", "invites", "invited", "inviting"], correct: 0, explanation: "✅ <strong>Invite</strong> (V1). Did not + V1." },
        { text: "Two days ago Mr Salvo ______________ on Tiktok", options: ["live", "lives", "lived", "is living"], correct: 2, explanation: "✅ <strong>Lived</strong> (Simple Past). 'Two days ago' = waktu lampau." },
        { text: "Your Mom __________ rice every day", options: ["cook", "cooks", "cooked", "cooking"], correct: 1, explanation: "✅ <strong>Cooks</strong>. 'Every day' = kebiasaan, subject Mom = she + s." },
        { text: "Emi _____ submitted her tasks", options: ["has", "have", "is", "are"], correct: 0, explanation: "✅ <strong>Has</strong> (Present Perfect). Emi = she → has." },
        { text: "_______ your Little brother had breakfast ?", options: ["Has", "Have", "Is", "Does"], correct: 0, explanation: "✅ <strong>Has</strong> untuk Present Perfect question. Your little brother = he." },
        { text: "My mom cannot __________ English well", options: ["speak", "speaks", "spoke", "speaking"], correct: 0, explanation: "✅ <strong>Speak</strong> (V1). Setelah modal 'cannot' harus V1." },
        { text: "______ caca _________ some flowers right now ?", options: ["Is - picking", "Are - picking", "Do - pick", "Does - pick"], correct: 0, explanation: "✅ <strong>Is - picking</strong> (Present Continuous). 'Right now' = sedang berlangsung." },
        { text: "______ you at school last night guys?", options: ["Was", "Were", "Are", "Is"], correct: 1, explanation: "✅ <strong>Were</strong> untuk subject 'you' di waktu lampau." },
        { text: "He can not _______ English well", options: ["speak", "speaks", "spoke", "speaking"], correct: 0, explanation: "✅ <strong>Speak</strong> (V1). Can not + V1." },
        { text: "Vita ____________________ English In Mr Salvo Room now", options: ["is studying", "are studying", "studies", "study"], correct: 0, explanation: "✅ <strong>Is studying</strong> (Present Continuous). 'Now' = sedang berlangsung." },
        { text: "Jihan ______________ to Surabaya next week", options: ["will go", "go", "goes", "went"], correct: 0, explanation: "✅ <strong>Will go</strong> (Simple Future). 'Next week' = waktu akan datang." },
        { text: "_____ you ___________ come to my party tonight ?", options: ["Will - come", "Do - come", "Are - come", "Did - come"], correct: 0, explanation: "✅ <strong>Will - come</strong> (Future). 'Tonight' = waktu akan datang." },
        { text: "______ your friends attended art exhibition ?", options: ["Have", "Has", "Do", "Does"], correct: 0, explanation: "✅ <strong>Have</strong> untuk Present Perfect dengan subject jamak." },
        { text: "____ you watch spiderman movie with ____ tomorrow ?", options: ["Will - me", "Do - I", "Are - my", "Did - mine"], correct: 0, explanation: "✅ <strong>Will - me</strong> (Future + object pronoun)." },
        { text: "_______ your cousin cooked _______- ?", options: ["Has - yet", "Have - yet", "Is - already", "Are - just"], correct: 0, explanation: "✅ <strong>Has - yet</strong> (Present Perfect question). 'Yet' untuk kalimat tanya." },
        { text: "_____ those letters written by _______?", options: ["Were - her", "Was - she", "Are - him", "Is - his"], correct: 0, explanation: "✅ <strong>Were - her</strong> (Passive Voice). 'Those letters' jamak → were." }
    ];

    let answers = new Array(questions.length).fill(null);
    let currentIndex = 0;

    function updateUI() {
        const q = questions[currentIndex];
        const isAnswered = answers[currentIndex] !== null;
        const selected = answers[currentIndex];
        const isCorrect = isAnswered && selected === q.correct;

        // Update question
        document.getElementById('questionText').innerHTML = q.text;

        // Update options
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            let extraClass = '';
            if (isAnswered && idx === q.correct) extraClass = 'correct-bg';
            if (isAnswered && idx === selected && idx !== q.correct) extraClass = 'wrong-bg';
            const checked = (selected === idx) ? 'checked' : '';
            const disabled = isAnswered ? 'disabled' : '';
            
            optionsHtml += `
                <div class="option ${extraClass} ${disabled}" onclick="if(!${isAnswered}) selectAnswer(${idx})">
                    <input type="radio" name="quiz" value="${idx}" ${checked} ${disabled}>
                    <label>${String.fromCharCode(65+idx)}. ${opt}</label>
                </div>
            `;
        });
        document.getElementById('optionsContainer').innerHTML = optionsHtml;

        // Update explanation
        const explanationDiv = document.getElementById('explanationBox');
        if (isAnswered) {
            explanationDiv.innerHTML = `<i>💡</i> <strong>Penjelasan:</strong><br>${q.explanation}`;
            explanationDiv.classList.add('show');
        } else {
            explanationDiv.classList.remove('show');
        }

        // Update badge di stats
        updateStats();
        document.getElementById('pageIndicator').innerHTML = `${currentIndex+1} / ${questions.length}`;
        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === questions.length - 1;
    }

    function selectAnswer(optIndex) {
        if (answers[currentIndex] !== null) return;
        
        const isCorrect = (optIndex === questions[currentIndex].correct);
        answers[currentIndex] = optIndex;
        
        if (isCorrect) {
            // CONFETTI LANGSUNG MUNCUL!
            canvasConfetti({ particleCount: 180, spread: 85, origin: { y: 0.5 }, colors: ['#7c3aed', '#a855f7', '#fbbf24', '#10b981'] });
            setTimeout(() => {
                canvasConfetti({ particleCount: 60, angle: 60, spread: 60, origin: { x: 0, y: 0.6 } });
                canvasConfetti({ particleCount: 60, angle: 120, spread: 60, origin: { x: 1, y: 0.6 } });
            }, 100);
        }
        
        updateUI();
        saveToLocalStorage();
    }

    function updateStats() {
        const answeredCount = answers.filter(a => a !== null).length;
        const score = answers.reduce((acc, ans, idx) => acc + (ans === questions[idx].correct ? 1 : 0), 0);
        document.getElementById('score').innerText = score;
        document.getElementById('answered').innerText = answeredCount;
        document.getElementById('total').innerText = questions.length;
    }

    function saveToLocalStorage() {
        localStorage.setItem('quizAnswers', JSON.stringify(answers));
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('quizAnswers');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed.length === questions.length) {
                answers = parsed;
            }
        }
    }

    function resetQuiz() {
        if (confirm('Reset semua jawaban?')) {
            answers = new Array(questions.length).fill(null);
            updateUI();
            saveToLocalStorage();
        }
    }

    function showResult() {
        const score = answers.reduce((acc, ans, idx) => acc + (ans === questions[idx].correct ? 1 : 0), 0);
        const total = questions.length;
        const percentage = (score / total) * 100;
        
        let message = '';
        if (percentage >= 90) message = '🏆 Excellent! Grammar Master! 🏆';
        else if (percentage >= 75) message = '🎉 Good job! Keep improving! 🎉';
        else if (percentage >= 60) message = '📚 Not bad, review the explanations!';
        else message = '💪 Keep learning! Review the grammar rules!';
        
        document.getElementById('finalScore').innerText = `${score}/${total}`;
        document.getElementById('gradeMessage').innerHTML = `${message}<br>📊 Score: ${score * 5} points (${percentage}%)`;
        document.getElementById('resultModal').classList.add('show');
        
        if (score >= 15) {
            canvasConfetti({ particleCount: 400, spread: 120, origin: { y: 0.5 } });
        }
    }

    document.getElementById('prevBtn').onclick = () => { if (currentIndex > 0) { currentIndex--; updateUI(); } };
    document.getElementById('nextBtn').onclick = () => { if (currentIndex < questions.length - 1) { currentIndex++; updateUI(); } };
    document.getElementById('resetBtn').onclick = resetQuiz;
    document.getElementById('submitBtn').onclick = showResult;
    document.getElementById('closeResultBtn').onclick = () => document.getElementById('resultModal').classList.remove('show');
    document.getElementById('resultModal').onclick = (e) => { if (e.target === document.getElementById('resultModal')) document.getElementById('resultModal').classList.remove('show'); };
    
    window.selectAnswer = selectAnswer;
    
    loadFromLocalStorage();
    updateUI();
</script>
</body>
</html>
